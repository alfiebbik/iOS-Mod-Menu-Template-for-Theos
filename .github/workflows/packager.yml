name: Build
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
      - name: Build
        run: make package FINALPACKAGE=1
      - uses: actions/upload-artifact@v4
        with:
          name: AlfieClient
          path: packages/*.deb
